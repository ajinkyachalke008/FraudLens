version: '3.9'
services:

  pgadmin:
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    ports: ["5050:80"]
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@fraudlens.local
      PGADMIN_DEFAULT_PASSWORD: fraudlens2025
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on: [postgres]

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    restart: unless-stopped
    ports: ["8090:8080"]
    environment:
      KAFKA_CLUSTERS_0_NAME: fraudlens-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    depends_on: [kafka]

  redis-commander:
    image: rediscommander/redis-commander:latest
    restart: unless-stopped
    ports: ["8081:8081"]
    environment:
      REDIS_HOSTS: local:redis:6379
    depends_on: [redis]

  flower:
    image: mher/flower:2.0
    restart: unless-stopped
    ports: ["5555:5555"]
    environment:
      CELERY_BROKER_URL: redis://redis:6379/1
      FLOWER_PORT: 5555
    depends_on: [redis]

  mailhog:
    image: mailhog/mailhog:latest
    restart: unless-stopped
    ports: ["1025:1025", "8025:8025"]

volumes:
  pgadmin_data:

networks:
  default:
    external:
      name: fraudlens_default
