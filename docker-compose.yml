version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: fraudlens_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fraudlens_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fraudlens_secure_pass_2024}
      POSTGRES_DB: ${POSTGRES_DB:-fraudlens}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fraudlens_network

  neo4j:
    image: neo4j:5.20.0
    container_name: fraudlens_neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-fraudlens_graph_pass_2024}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    networks:
      - fraudlens_network

  prometheus:
    image: prom/prometheus:latest
    container_name: fraudlens_prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - fraudlens_network

  grafana:
    image: grafana/grafana:latest
    container_name: fraudlens_grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - fraudlens_network

  redis:
    image: redis:alpine
    container_name: fraudlens_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - fraudlens_network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: fraudlens_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - fraudlens_network

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: fraudlens_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - fraudlens_network

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fraudlens_celery_worker
    restart: unless-stopped
    command: celery -A core.celery_app.celery_app worker --loglevel=info
    depends_on:
      - redis
      - postgres
      - neo4j
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-fraudlens_user}:${POSTGRES_PASSWORD:-fraudlens_secure_pass_2024}@postgres:5432/${POSTGRES_DB:-fraudlens}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-fraudlens_graph_pass_2024}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    networks:
      - fraudlens_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fraudlens_backend
    restart: unless-stopped
    depends_on:
      - postgres
      - neo4j
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-fraudlens_user}:${POSTGRES_PASSWORD:-fraudlens_secure_pass_2024}@postgres:5432/${POSTGRES_DB:-fraudlens}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-fraudlens_graph_pass_2024}
      - SECRET_KEY=${SECRET_KEY:-your_super_secret_key_change_in_production}
      - ACCESS_TOKEN_EXPIRE_MINUTES=1440
    ports:
      - "8001:8001"
    networks:
      - fraudlens_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fraudlens_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8001/api/v1
    ports:
      - "3000:3000"
    networks:
      - fraudlens_network

networks:
  fraudlens_network:
    driver: bridge

volumes:
  postgres_data:
  neo4j_data:
